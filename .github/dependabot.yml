version: 2
updates:
  # GitHub Actions used in workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"

  # Android app (Gradle)
  - package-ecosystem: "gradle"
    directory: "/android"
    schedule:
      interval: "weekly"
    groups:
      gradle-dependencies:
        patterns:
          - "*"

  # Press service (Python deps)
  - package-ecosystem: "pip"
    directory: "/press"
    schedule:
      interval: "weekly"

  # Press service (Dockerfile base image)
  - package-ecosystem: "docker"
    directory: "/press"
    schedule:
      interval: "weekly"
